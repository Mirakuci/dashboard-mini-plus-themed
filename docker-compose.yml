version: "3.8"
services:
  backend:
    build: ./backend
    container_name: backend_8300
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
    ports:
      - "8300:8300"
  frontend:
    build: ./frontend
    container_name: frontend_8300
    environment:
      - NEXT_PUBLIC_API_BASE=http://backend:8300
    ports:
      - "3000:3000"
    depends_on:
      - backend
